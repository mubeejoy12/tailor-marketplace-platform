# Production Configuration
# IMPORTANT: All sensitive values MUST be set via environment variables
# DO NOT hard-code any secrets in this file

spring.application.name=tailor-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/tailor_db
spring.datasource.username=postgres
spring.datasource.password=${DATABASE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Production settings - disable SQL logging for performance
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

server.port=8080

# JWT configuration - MUST be set via JWT_SECRET environment variable
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Production logging level
logging.level.root=WARN
logging.level.com.tailorplatform=INFO
