# Development Configuration
# WARNING: This file contains default credentials for LOCAL DEVELOPMENT ONLY
# DO NOT use these credentials in production

spring.application.name=tailor-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/tailor_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Development JWT Secret - DO NOT use in production
jwt.secret=dev-secret-key-change-in-production
jwt.expiration-ms=86400000
