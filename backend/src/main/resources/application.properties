spring.application.name=tailor-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/tailor_db
spring.datasource.username=postgres
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# JWT configuration - IMPORTANT: Set JWT_SECRET environment variable in production
# Default fallback is used only for development when JWT_SECRET is not set
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Paystack — set PAYSTACK_SECRET_KEY env var in production, never hardcode
paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_868d6d05ea4a1ba08791a3c9ac547ccabff80450}
paystack.base-url=https://api.paystack.co
# Frontend callback URL — Paystack redirects here after payment
paystack.callback-url=${PAYSTACK_CALLBACK_URL:http://localhost:3000/payments/callback}